<!DOCTYPE html>
<html>
<head>
  <title>Teacher Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    table, th, td { border: 1px solid black; border-collapse: collapse; padding: 5px; }
    table { margin-top: 20px; width: 90%; }
    .at-risk { background-color: #ffcccc; }
    #importSection, #progressSection { margin-top: 20px; border: 1px solid #ccc; padding: 10px; width: 90%; }
    input.gradeInput { width: 50px; }
    #selectedFile { margin-left: 10px; font-style: italic; }
    button.studentBtn { background-color: #4CAF50; color: white; border: none; padding: 3px 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Teacher Dashboard</h1>
  <p id="welcome"></p>

  <button onclick="viewClasses()">View My Classes</button>
  <button onclick="viewStudents()">View Students & Grades</button>
  <button onclick="logout()">Logout</button>

  <!-- CSV Import Section -->
  <div id="importSection">
    <h2>Import Students & Grades</h2>
    <button onclick="chooseCSV()">Select CSV File</button>
    <span id="selectedFile">No file selected</span>
    <button onclick="importCSV()">Import CSV</button>
    <p><small>CSV format: name,email,class,assignment,earned_points,total_points,due_date,type</small></p>
  </div>

  <!-- Main Content -->
  <div id="content"></div>

  <script>
    const { ipcRenderer } = require('electron');
    const db = require('./database');
    const fs = require('fs');
    const path = require('path');

    let currentUser = null;
    let csvFilePath = null;

    try {
      const sessionPath = path.join(__dirname, 'currentUser.json');
      currentUser = JSON.parse(fs.readFileSync(sessionPath, 'utf-8'));
      if (!currentUser || currentUser.role !== 'teacher') throw new Error("Invalid teacher session");
      document.getElementById('welcome').innerText = `Welcome, ${currentUser.name}`;
    } catch (err) {
      console.error(err);
      alert("Session expired. Please log in again.");
      location.replace("index.html");
    }

    function requireUser() { if (!currentUser) { alert("User session not loaded"); return false; } return true; }

    // ===== Classes =====
    function viewClasses() {
      if (!requireUser()) return;
      db.all("SELECT * FROM classes WHERE teacher_id = ?", [currentUser.id], (err, rows) => {
        if (err) return alert(err.message);
        let html = "<h2>My Classes</h2><table><tr><th>ID</th><th>Name</th></tr>";
        rows.forEach(c => {
          const className = c.name?.trim() || 'Unnamed Class';
          html += `<tr><td>${c.id}</td><td>${className}</td></tr>`;
        });
        html += "</table>";
        document.getElementById('content').innerHTML = html;
      });
    }

    // ===== Students =====
    function viewStudents() {
      if (!requireUser()) return;

      db.all(`
        SELECT DISTINCT users.id, users.name AS student
        FROM users
        JOIN student_classes ON users.id = student_classes.student_id
        JOIN classes ON student_classes.class_id = classes.id
        WHERE users.role='student' AND classes.teacher_id = ?
        ORDER BY users.name
      `, [currentUser.id], (err, students) => {
        if (err) return alert(err.message);
        if (students.length === 0) {
          document.getElementById('content').innerHTML = "<p>No students found. Import CSV to add students.</p>";
          return;
        }

        let html = "<h2>Students</h2><table><tr><th>Name</th><th>Actions</th></tr>";
        students.forEach(s => {
          const studentName = s.student?.trim() || 'Unnamed Student';
          html += `<tr>
            <td>${studentName}</td>
            <td><button class="studentBtn" onclick="generateProgressReport(${s.id}, '${studentName.replace(/'/g, "\\'")}')">View Progress</button></td>
          </tr>`;
        });
        html += "</table>";
        document.getElementById('content').innerHTML = html;
      });
    }

    // ===== Progress Report =====
    function generateProgressReport(studentId, studentName) {
      if (!requireUser()) return;

      db.all(`
        SELECT classes.name AS class_name,
               AVG(grades.percentage) AS avg_percentage
        FROM student_classes
        JOIN classes ON student_classes.class_id = classes.id
        LEFT JOIN assignments ON assignments.class_id = classes.id
        LEFT JOIN grades ON grades.student_id = student_classes.student_id
                          AND grades.assignment_id = assignments.id
        WHERE student_classes.student_id = ? AND classes.teacher_id = ?
        GROUP BY classes.id
        ORDER BY classes.name
      `, [studentId, currentUser.id], (err, rows) => {
        if (err) return alert(err.message);
        if (rows.length === 0) return alert("No grades found for this student.");

        let html = `<h2>Progress Report for ${studentName}</h2>`;
        html += `<table><tr><th>Class</th><th>Average %</th></tr>`;

        let totalAvg = 0;
        rows.forEach(r => {
          const avg = r.avg_percentage || 0;
          const className = r.class_name?.trim() || 'Unnamed Class';
          totalAvg += avg;
          const atRisk = avg < 70 ? "at-risk" : "";
          html += `<tr class="${atRisk}">
            <td>${className}</td>
            <td>${avg !== null ? avg.toFixed(2) + "%" : "N/A"}</td>
          </tr>`;
        });

        const overallPercent = rows.length ? totalAvg / rows.length : 0;

        let overallGPA;
        if (overallPercent >= 93) overallGPA = 4.0;
        else if (overallPercent >= 90) overallGPA = 3.7;
        else if (overallPercent >= 87) overallGPA = 3.3;
        else if (overallPercent >= 83) overallGPA = 3.0;
        else if (overallPercent >= 80) overallGPA = 2.7;
        else if (overallPercent >= 77) overallGPA = 2.3;
        else if (overallPercent >= 73) overallGPA = 2.0;
        else if (overallPercent >= 70) overallGPA = 1.7;
        else if (overallPercent >= 67) overallGPA = 1.3;
        else if (overallPercent >= 65) overallGPA = 1.0;
        else overallGPA = 0.0;

        html += `<tr>
          <td><strong>Overall GPA</strong></td>
          <td><strong>${overallGPA.toFixed(2)}</strong></td>
        </tr>`;
        html += `</table>`;

        html += `<h3>Assignments</h3><table>
          <tr>
            <th>Class</th>
            <th>Assignment</th>
            <th>Earned / Total</th>
            <th>%</th>
            <th>Due Date</th>
            <th>Type</th>
          </tr>`;

        db.all(`
          SELECT classes.name AS class_name,
                 assignments.name AS assignment_name,
                 MAX(grades.earned_points) AS earned_points,
                 MAX(assignments.total_points) AS total_points,
                 MAX(grades.percentage) AS percentage,
                 assignments.due_date, assignments.type
          FROM grades
          JOIN assignments ON grades.assignment_id = assignments.id
          JOIN classes ON assignments.class_id = classes.id
          WHERE grades.student_id = ? AND classes.teacher_id = ?
          GROUP BY grades.student_id, assignments.id
          ORDER BY classes.name, assignments.name
        `, [studentId, currentUser.id], (err, assignmentRows) => {
          if (err) return alert(err.message);

          assignmentRows.forEach(r => {
            const className = r.class_name?.trim() || 'Unnamed Class';
            const assignmentName = r.assignment_name?.trim() || 'Unnamed Assignment';
            html += `<tr class="${r.percentage < 70 ? 'at-risk' : ''}">
              <td>${className}</td>
              <td>${assignmentName}</td>
              <td>${r.earned_points} / ${r.total_points}</td>
              <td>${r.percentage.toFixed(2)}%</td>
              <td>${r.due_date || 'N/A'}</td>
              <td>${r.type || 'Homework'}</td>
            </tr>`;
          });

          html += `</table>`;
          document.getElementById('content').innerHTML = html;
        });
      });
    }

    function logout() {
      const sessionPath = path.join(__dirname, 'currentUser.json');
      if (fs.existsSync(sessionPath)) fs.unlinkSync(sessionPath);
      location.replace("index.html");
    }

    async function chooseCSV() {
      const file = await ipcRenderer.invoke('select-csv');
      if (file) {
        csvFilePath = file;
        document.getElementById('selectedFile').innerText = file;
      } else {
        csvFilePath = null;
        document.getElementById('selectedFile').innerText = "No file selected";
      }
    }

    async function importCSV() {
      if (!requireUser()) return;
      if (!csvFilePath) return alert("Please select a CSV file.");

      try {
        const message = await ipcRenderer.invoke(
          'import-csv',
          csvFilePath,
          currentUser.id
        );
        alert(message);
        viewStudents(); // refresh table to include new students
      } catch (err) {
        alert("Error: " + err);
      }
    }
  </script>
</body>
</html>
