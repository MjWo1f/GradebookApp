<!DOCTYPE html>
<html>
<head>
  <title>Student Dashboard</title>
  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
      padding: 5px;
    }
    table {
      margin-top: 20px;
      width: 90%;
    }
    .at-risk {
      background-color: #ffcccc;
    }
  </style>
</head>

<body>
  <h1>Student Dashboard</h1>
  <p id="welcome"></p>

  <button id="btnGrades">View Grades</button>
  <button id="btnAssignments">View Assignments</button>
  <button id="btnProgress">View Progress Report</button>
  <button id="btnLogout">Logout</button>

  <div id="content"></div>

  <script>
    const fs = require('fs');
    const path = require('path');
    const db = require('./database');

    let currentUser = null;

    try {
      const sessionPath = path.join(__dirname, 'currentUser.json');
      currentUser = JSON.parse(fs.readFileSync(sessionPath, 'utf-8'));

      if (!currentUser || currentUser.role !== 'student') {
        throw new Error("Invalid session");
      }
    } catch (err) {
      alert("Session expired. Please log in again.");
      location.replace("index.html");
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('welcome').innerText = `Welcome, ${currentUser.name}`;
      document.getElementById('btnGrades').onclick = viewGrades;
      document.getElementById('btnAssignments').onclick = viewAssignments;
      document.getElementById('btnProgress').onclick = viewProgress;
      document.getElementById('btnLogout').onclick = logout;
    });

    function viewGrades() {
      db.all(`
        SELECT c.name AS class_name, a.name AS assignment_name,
               g.earned_points, a.total_points, g.percentage
        FROM grades g
        JOIN assignments a ON a.id = g.assignment_id
        JOIN classes c ON c.id = a.class_id
        WHERE g.student_id = ?
        ORDER BY c.name, a.name
      `, [currentUser.id], (err, rows) => {
        if (err) return alert(err.message);

        let html = "<h2>Your Grades</h2>";
        html += `<table>
          <tr><th>Class</th><th>Assignment</th><th>Earned</th><th>Total</th><th>%</th></tr>`;

        rows.forEach(r => {
          const atRisk = r.percentage < 70 ? "at-risk" : "";
          html += `<tr class="${atRisk}">
            <td>${r.class_name}</td>
            <td>${r.assignment_name}</td>
            <td>${r.earned_points}</td>
            <td>${r.total_points}</td>
            <td>${r.percentage.toFixed(2)}%</td>
          </tr>`;
        });

        html += "</table>";
        document.getElementById('content').innerHTML = html;
      });
    }

    function viewAssignments() {
      db.all(`
        SELECT DISTINCT c.name AS class_name, a.name AS assignment_name, a.due_date
        FROM student_classes sc
        JOIN classes c ON c.id = sc.class_id
        JOIN assignments a ON a.class_id = c.id
        WHERE sc.student_id = ?
        ORDER BY c.name, a.due_date
      `, [currentUser.id], (err, rows) => {
        if (err) return alert(err.message);

        let html = "<h2>Assignments</h2>";
        html += `<table><tr><th>Class</th><th>Assignment</th><th>Due Date</th></tr>`;

        rows.forEach(r => {
          html += `<tr>
            <td>${r.class_name}</td>
            <td>${r.assignment_name}</td>
            <td>${r.due_date || 'N/A'}</td>
          </tr>`;
        });

        html += "</table>";
        document.getElementById('content').innerHTML = html;
      });
    }

    function viewProgress() {
      db.all(`
        SELECT c.name AS class_name, AVG(g.percentage) AS class_avg
        FROM grades g
        JOIN assignments a ON a.id = g.assignment_id
        JOIN classes c ON c.id = a.class_id
        WHERE g.student_id = ?
        GROUP BY c.id
        ORDER BY c.name
      `, [currentUser.id], (err, rows) => {
        if (err) return alert(err.message);

        let html = "<h2>Progress Report</h2>";
        html += `<table><tr><th>Class</th><th>Average %</th></tr>`;

        let totalAvg = 0;

        rows.forEach(r => {
          const avg = r.class_avg || 0;
          totalAvg += avg;
          const atRisk = avg < 70 ? "at-risk" : "";
          html += `<tr class="${atRisk}">
            <td>${r.class_name}</td>
            <td>${avg.toFixed(2)}%</td>
          </tr>`;
        });

        const overallPercent = rows.length ? totalAvg / rows.length : 0;

        // Convert overall percent to GPA
        let overallGPA;
        if (overallPercent >= 93) overallGPA = 4.0;
        else if (overallPercent >= 90) overallGPA = 3.7;
        else if (overallPercent >= 87) overallGPA = 3.3;
        else if (overallPercent >= 83) overallGPA = 3.0;
        else if (overallPercent >= 80) overallGPA = 2.7;
        else if (overallPercent >= 77) overallGPA = 2.3;
        else if (overallPercent >= 73) overallGPA = 2.0;
        else if (overallPercent >= 70) overallGPA = 1.7;
        else if (overallPercent >= 67) overallGPA = 1.3;
        else if (overallPercent >= 65) overallGPA = 1.0;
        else overallGPA = 0.0;

        html += `<tr>
          <td><strong>Overall GPA</strong></td>
          <td><strong>${overallGPA.toFixed(2)}</strong></td>
        </tr>`;

        html += "</table>";
        document.getElementById('content').innerHTML = html;
      });
    }

    function logout() {
      fs.unlinkSync(path.join(__dirname, 'currentUser.json'));
      location.replace("index.html");
    }
  </script>
</body>
</html>
